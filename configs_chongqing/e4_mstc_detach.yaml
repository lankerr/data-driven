# E4: 多尺度时间金字塔 (detach 模式)
# 每级独立梯度, 但 concat + 残差锚仍前向贯通 (数值层面仍协同)
data:
  chongqing_dir: "C:/Users/97290/Desktop/datasets/2026chongqing/vil_gpu_daily_240_simple"
  img_size: 384
  in_frames: 210
  out_frames: 30
  stride: 240
  train_ratio: 0.7
  val_ratio: 0.15
  exclude_years: [2024]
  num_workers: 2
  use_qmap: false
  vil_cutoff: 1.0

model:
  experiment: "mstc"
  vit_backbone: "swin_t"
  pretrained: true
  reduce_stem: true
  dropout: 0.1

mstc:
  use_fine: true
  detach_between_stages: true
  loss_weights:     # detach 模式各级等权
    w_l0: 1.0
    w_l1: 1.0
    w_l2: 1.0
    w_l3: 1.0

training:
  batch_size: 1
  epochs: 60
  lr: 8.0e-5
  weight_decay: 1.0e-5
  scheduler: "cosine"
  warmup_epochs: 5

  loss: "combined"
  ssim_weight: 0.3
  bmse_thresholds: [0.158, 0.408, 0.546, 0.693]
  bmse_weights:    [1.0,   7.0,   22.0,  39.0,  100.0]

  patience: 12
  min_delta: 1.0e-4
  save_dir: "./checkpoints_cq"
  log_dir: "./logs_cq"
  amp: true

evaluation:
  thresholds: [0.158, 0.408, 0.546, 0.693]
  threshold_names: ["VIL1", "VIL5", "VIL10", "VIL20"]

experiment_tag: "cq_e4_mstp_detach"
