# E1: 3h → 3h 基线 (VIT-UNET 直接 30 帧 → 30 帧)
data:
  chongqing_dir: "C:/Users/97290/Desktop/datasets/2026chongqing/vil_gpu_daily_240_simple"
  img_size: 384
  in_frames: 30          # 3h @ 6min
  out_frames: 30         # 3h @ 6min
  stride: 30             # 不重叠窗口; 一天 240帧 ⇒ 4 个样本
  train_ratio: 0.7
  val_ratio: 0.15
  exclude_years: [2024]
  num_workers: 2
  max_days: null
  # 正确管线: stored×80 → cutoff → (可选 QMap) → log1p/log1p(80)
  use_qmap: false          # 从头训 CQ, 不需要 QMap (代价是把弱雨夸大成SEVIR中雨)
  vil_cutoff: 1.0          # VIL < 1 kg/m² 归零 (去杂波)

model:
  experiment: "vit_unet"
  vit_backbone: "swin_t"
  pretrained: true
  reduce_stem: true
  decoder_channels: [256, 128, 64, 32]
  dropout: 0.1

training:
  batch_size: 2
  epochs: 80
  lr: 1.0e-4
  weight_decay: 1.0e-5
  scheduler: "cosine"
  warmup_epochs: 5

  # BMSE 阈值/权重 (已是 log1p 归一化域):
  #   VIL(kg/m²) 1 → norm 0.158 (米量圆字阈值, 占比~0.88%)
  #   VIL        5 → norm 0.408 (~0.056%)
  #   VIL       10 → norm 0.546 (~0.011%)
  #   VIL       20 → norm 0.693 (~0.001%)
  # 权重按 1/p^0.4 温和形式归一化 (避免早期训练爆炸)
  loss: "combined"           # BMSE + SSIM
  ssim_weight: 0.3
  bmse_thresholds: [0.158, 0.408, 0.546, 0.693]
  bmse_weights:    [1.0,   7.0,   22.0,  39.0,  100.0]

  patience: 15
  min_delta: 1.0e-4
  save_dir: "./checkpoints_cq"
  log_dir: "./logs_cq"
  amp: true             # 开启混合精度

evaluation:
  thresholds: [0.158, 0.408, 0.546, 0.693]
  threshold_names: ["VIL1", "VIL5", "VIL10", "VIL20"]

experiment_tag: "cq_e1_3h_to_3h_vitunet"
